- type: entity
  abstract: true
  id: STHunterVendorBase
  description: A gear rack for hunting.
  placement:
    mode: SnapgridCenter
  components:
  - type: CMAutomatedVendor
  - type: Transform
    noRot: true
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 200
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Tag
    tags:
    - Structure
  - type: Sprite
    sprite: _Stories/Structures/Machines/VendingMachines/hunter_vendor.rsi
    offset: 0,0.5
    layers:
    - state: "hunter_vendor_left"
      map: [ "enum.VendingMachineVisualLayers.Base" ]
  - type: UserInterface
    interfaces:
      enum.CMAutomatedVendorUI.Key:
        type: CMAutomatedVendorBui
  - type: ActivatableUI
    key: enum.CMAutomatedVendorUI.Key
  - type: ActivatableUIRequiresAccess
  - type: WallMount
    arc: 360
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: CMVendorBundleRiflemanApparel
  id: STVendorBundleHunterEssential
  name: hunting equipment bundle
  components:
  - type: Sprite
    sprite: _Stories/Objects/Clothing/Uniforms/hunter.rsi
    state: icon
  - type: CMVendorBundle
    bundle:
    - STMeshHunter
    - STHunterPouch
    - STPouchMediCompFilled
    - STHunterTeleporterBeacon
    - STHunterCleanerVial

- type: entity
