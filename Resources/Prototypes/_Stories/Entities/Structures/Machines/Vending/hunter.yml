- type: entity
  parent: CMVendorBundleRiflemanApparel
  id: STVendorBundleHunterArmor
  name: armor
  description: A suit of armor with light padding. It looks old, yet functional.
  components:
  - type: Sprite
    sprite: _Stories/Objects/Clothing/OuterClothing/Armor/Hunter/ClanArmor/ebony.rsi
    state: 1-icon
  - type: HunterProfileArmorBundle

# Base
- type: entity
  abstract: true
  parent: STHunterVendorBase
  id: STHunterVendorEquipBase
  name: Hunting Gear Rack
  suffix: Base
  components:
  - type: CMAutomatedVendor
    jobs:
    - STHunter
    sections:
    - name: Essential Hunting Supplies
      takeAll: CMEquipment
      entries:
      - id: STVendorBundleHunterEssential
      - id: STVendorBundleHunterArmor
    - name: Main Weapons
      choices: { STWeapon: 1 }
      entries:
      - id: STClanSword
      - id: STClanSwordAlt1
      - id: STClanSwordAlt2
      - id: STClanSwordAlt3
      # - id: STWeaponTaruulanStaff
      - id: STChainwhip
      - id: STDualWarScythe
      - id: STDoubleWarScythe
      # - id: STCombistick
      - id: STWarAxe
      - id: STWarGlaive
      - id: STCleavingGlaive
      - id: STLongAxe
      - id: STVendorBundleHunterScimitars
      - id: STVendorBundleHunterScimitarsAlt
      - id: STVendorBundleHunterChainGauntlets
    - name: Bracer Attachments
      choices: { STBracer: 1 }
      entries:
      - id: STVendorBundleHunterWristblades
      # - id: STBracerAttachmentShield
    - name: Secondary Equipment
      choices: { STAdd: 2 }
      entries:
      # - id: STWeaponPlasmaCasterEbony
      # - id: STWeaponPlasmaPistol
      # - id: STFalconDrone
      # - id: STSmartDisc
      # - id: STWeaponShieldRiotHunter
      - id: STFullArmorClanHunterEbony
      - id: STQuiverHunterFilled
    - name: Clothing Accessory
      choices: { STAccessories: 1 }
      entries:
      - id: STHunterCapeThird
      - id: STHunterCapeHalf
      - id: STHunterCapeQuarter
      - id: STHunterCapePoncho

