- type: entity
  parent: RMCPodDoorButton
  id: STPodDoorButtonHunter
  name: button
  description: A remote control-switch for a door.
  components:
  - type: Sprite
    drawdepth: SmallObjects
    sprite: _Stories/Structures/Machinery/hunter_machines.rsi
    layers:
    - state: doorctrl
      map: [ "enum.RMCPodDoorButtonLayers.Animation" ]
    - state: doorctrl-p
      visible: false
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]
  - type: AccessReader
    access: [ [ "STAccessHunterSecure" ] ]
