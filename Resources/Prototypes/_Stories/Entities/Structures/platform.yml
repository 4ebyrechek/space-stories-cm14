- type: entity
  parent: CMPlatform
  id: STPlatformHunter
  name: raised metal platform
  description: A raised level of metal, often used to elevate areas above others, or construct bridges. You could probably climb it.
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    sprite: _Stories/Structures/platforms.rsi
    state: hunter_platform
  - type: Construction
    graph: STPlatformHunterDestructible
    node: start

