- type: entity
  parent: [STHunterBaseItem, CMBootsBlack]
  id: STGreavesHunterBase
  abstract: true
  name: clan greaves
  description: A pair of armored, perfectly balanced boots. Perfect for running through the jungle.
  components:
  - type: ItemSlots
    slots:
      item:
        name: cm-knife
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m42a2.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m42a2.ogg
        whitelist:
          tags:
          - Knife
          - Holdout
          - Screwdriver
          - RMCScalpel
          - ThrowingKnife
        startingItem: STCeremonialDagger
