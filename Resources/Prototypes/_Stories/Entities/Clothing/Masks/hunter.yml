- type: entity
  parent: [STHunterBaseItem, ClothingMaskBase]
  id: STMaskHunterBase
  abstract: true
  categories: [ HideSpawnMenu ]
  name: clan mask
  description: A beautifully designed metallic face mask, both ornate and functional.
  components:
  - type: HunterVisionMask
    energyUsage: 3.0
    isActive: false
    toggleVisionActionId: STActionToggleHunterVision
  - type: Item
    size: Small
  - type: Scope
    useInHand: false
    scopingToggleAction: STActionToggleScope
    zoomLevels:
    - zoom: 1.6
      offset: 14
      allowMovement: true
      doAfter: 0
  - type: FlashImmunity
  - type: Storage
    maxItemSize: Tiny
    grid:
    - 0,0,1,1
    whitelist:
      tags:
      - STHunterMaskAccessory
  - type: EyeProtection
  - type: ParasiteResistance
    maxCount: 100
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: [ ]
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: FixedItemSizeStorage
  - type: HelmetAccessoryHolder
    slot: MASK
    isHat: false

