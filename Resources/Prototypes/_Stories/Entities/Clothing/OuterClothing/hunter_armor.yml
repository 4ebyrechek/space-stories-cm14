- type: entity
  parent: [STHunterBaseItem, RMCBaseArmor]
  id: STArmorClanHunterBase
  abstract: true
  name: clan armor
  description: A suit of armor with light padding. It looks old, yet functional.
  components:
  - type: CMArmor
    melee: 10
    bullet: 15
    bio: 0
    explosionArmor: 25
  - type: ClothingSpeedModifier
    walkModifier: 1.0
    sprintModifier: 1.0

