- type: entity
  parent: MarkerBase
  id: STHunterTeleporter
  name: hunter teleporter
  components:
  - type: Sprite
    layers:
    - state: red
  - type: HunterTeleporter
    teleporterType: Normal
  - type: InteractionOutline
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        hard: false
        mask:
        - MobLayer
        layer:
        - Impassable
  - type: PointLight
    enabled: true
    color: "#a034db"
    radius: 1.5
    softness: 1

- type: entity
