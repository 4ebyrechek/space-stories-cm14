- type: entity
  abstract: true
  parent: STHunterBaseItem
  id: STBracerAttachmentPlasmaCasterBase
  name: plasma caster mount
  description: A mounting mechanism for attaching a plasma caster to a bracer.
  components:
  - type: Tag
    tags:
    - STPredatorGear
    - STPlasmaCasterHolder
  - type: Item
    size: Small
  - type: Sprite
    state: icon
  - type: ItemSlots
    slots:
      caster-gun-slot:
        name: st-bracer-plasma-caster-slot
        locked: true
        insertOnInteract: false
        ejectOnInteract: false
        insertSound: null
        ejectSound: null

- type: entity
  parent: STBracerAttachmentPlasmaCasterBase
  id: STBracerAttachmentPlasmaCasterEbony
  components:
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Guns/Hunter/plasma_ebony.rsi
  - type: ContainerFill
    containers:
      caster-gun-slot: [ STWeaponPlasmaCasterEbony ]

