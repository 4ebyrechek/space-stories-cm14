- type: entity
  abstract: true
  parent: [STHunterBaseItem, RMCBaseMeleeWeapon]
  id: STHunterBaseMeleeWeapon
  components:
  - type: Tag
    tags:
    - STPredatorGear
    - STHunterMelee
  - type: Clothing
    slots:
    - suitStorage
    - Back

- type: entity
  parent: STHunterBaseMeleeWeapon
  id: STHarpoon
  name: large harpoon
  description: A huge metal spike with a hook at the end. It's carved with mysterious alien writing.
  components:
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Melee/spike.rsi
    state: icon
  - type: Item
    size: Normal
  - type: MeleeWeapon
    damage:
      types:
        Slash: 10
    soundHit:
      path: /Audio/_Stories/Weapons/bladeslice.ogg
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 30

- type: entity
  parent: STHunterBaseMeleeWeapon
  id: STCeremonialDagger
  name: ceremonial dagger
  description: A viciously sharp dagger inscribed with ancient Hunter markings. Smells thickly of blood. Carried by some hunters.
  components:
  - type: Tag
    tags:
    - Knife
    - STPredatorGear
    - STHunterMelee
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Melee/ceremonial_dagger.rsi
    state: icon
  - type: Item
    size: Tiny
  - type: MeleeWeapon
    damage:
      types:
        Slash: 25
    soundHit:
      path: /Audio/_Stories/Weapons/slash.ogg
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 20

- type: entity
  parent: STHunterBaseMeleeWeapon
  id: STChainwhip
  name: chainwhip
  description: A segmented, lightweight whip made of durable, acid-resistant metal. Not very common among Hunter Hunters, but still a dangerous weapon capable of shredding prey.
  components:
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Melee/chainwhip.rsi
    state: icon
  - type: Item
    size: Normal
  - type: MeleeWeapon
    damage:
      types:
        Slash: 30
    attackRate: 1.25
    soundHit:
      path: /Audio/_Stories/Weapons/chain_whip.ogg
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 25

- type: entity
  parent: STHunterBaseMeleeWeapon
  id: STClanSword
  name: clan sword
  description: An expertly crafted Hunter blade carried by hunters who wish to fight up close. Razor sharp and capable of cutting flesh into ribbons. Commonly carried by aggressive and lethal hunters.
  components:
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Melee/clan_sword.rsi
    state: icon
  - type: Item
    size: Large
  - type: MeleeWeapon
    damage:
      types:
        Slash: 35
    attackRate: 1
    soundHit:
      path: /Audio/_Stories/Weapons/bladeslice.ogg

