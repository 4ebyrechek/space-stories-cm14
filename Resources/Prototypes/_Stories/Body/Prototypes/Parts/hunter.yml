- type: entity
  id: STPartHunter
  parent: [BaseItem, BasePart]
  name: "hunter body part"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

- type: entity
  id: STTorsoHunter
  name: "hunter torso"
  parent: [STPartHunter, BaseTorso]
  components:
  - type: Sprite
    sprite: _Stories/Mobs/Hunter/parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: Blood
        Quantity: 20

